# Yuri Channel Configuration
# Location: ~/.yuri/config/channels.yaml

server:
  port: 7890

channels:
  telegram:
    enabled: false
    token: ""
    mode: polling
    owner_chat_id: ""

  feishu:
    enabled: false
    app_id: ""
    app_secret: ""
    webhook_url: ""
    owner_user_id: ""

chat_history:
  max_messages: 20
  storage: ~/.yuri/chat-history/

engine:
  cli_command: cc
  fallback_command: claude
  skill: yuri
  allowed_tools: "Read,Write,Edit,Bash,Glob,Grep"
